<header class="lk-site-header">
  <div class="lk-curation-bar">
    <span>Korea travel, shopping, and culture notes for U.S. readers</span>
    <a href="/deals/">Compare booking links</a>
  </div>

  <div class="lk-header-inner">
    <a href="{{ "/" | relURL }}" class="lk-site-brand" aria-label="LoveKorea home">
      <img src="{{ "lovekorea-logo.svg" | relURL }}" alt="" class="lk-site-logo" width="36" height="36">
      <span class="lk-site-title">LoveKorea</span>
    </a>

    <nav class="lk-main-nav" aria-label="Main">
      <ul>
        {{ range .Site.Menus.main }}
          <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>

    <div class="lk-header-actions">
      <a class="lk-header-shop" href="https://yoitzi.com/" target="_blank" rel="noopener">Yoitzi</a>
    </div>
  </div>
</header>
