<header class="site-header">
  <div class="header-inner">
    <a href="{{ "/" | relURL }}" class="site-brand" aria-label="LoveKorea home">
      <img src="{{ "lovekorea-logo.svg" | relURL }}" alt="" class="site-logo" width="36" height="36">
      <span class="site-title">LoveKorea</span>
    </a>

    <nav class="main-nav" aria-label="Main">
      <ul>
        {{ range .Site.Menus.main }}
          <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>

    <div class="header-right">
      {{ partial "search.html" . }}
    </div>
  </div>
</header>

<style>
  :root {
    --header-pad-x: 40px;
    --header-pad-y: 10px;
    --header-border: #eaeaea;
    --brand: #e60023;
  }

  .site-header{
    position: sticky;
    top: 0;
    z-index: 9999;
    background: #fff;
    border-bottom: 1px solid var(--header-border);
  }

  .header-inner{
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 20px;
    padding: var(--header-pad-y) var(--header-pad-x);
  }

  .site-brand{
    justify-self: start;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--brand);
    text-decoration: none;
    white-space: nowrap;
  }

  .site-logo{
    display: block;
    width: 36px;
    height: 36px;
    flex: 0 0 auto;
  }

  .site-title{
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
  }

  .main-nav ul{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    margin: 0;
    padding: 0;
    list-style: none;
    font-size: 1.1rem;
  }

  .main-nav a{
    position: relative;
    text-decoration: none;
    color: #333;
    font-weight: 500;
    transition: color .2s ease;
    padding-bottom: 4px;
  }

  .main-nav a::after{
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 0;
    height: 2px;
    background-color: var(--brand);
    transition: width .3s ease;
  }

  .main-nav a:hover{
    color: var(--brand);
  }

  .main-nav a:hover::after{
    width: 100%;
  }

  .header-right{
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  @media (max-width: 768px){
    .header-inner{
      grid-template-columns: 1fr;
      gap: 10px;
      padding-inline: 20px;
    }

    .site-brand{
      justify-self: center;
    }

    .header-right{
      justify-self: center;
    }

    .main-nav ul{
      gap: 18px;
      flex-wrap: wrap;
      font-size: 1rem;
    }
  }
</style>
