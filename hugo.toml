baseURL = "https://lovekorea.me/"
languageCode = "en"
title = "LoveKorea"
theme = "PaperMod"
enableRobotsTXT = true
defaultContentLanguage = "en"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[params]
  author = "LoveKorea"
  description = "Curated Korea travel, K-beauty, shopping, culture, ticket, and itinerary guides for U.S. travelers who want practical choices with an editor's eye."
  keywords = ["Korea travel", "South Korea itinerary", "K-beauty", "Korean culture", "Seoul tickets", "Busan travel", "Jeju travel"]
  images = ["images/lovekorea-og.png"]
  mainSections = ["posts"]
  ogLocale = "en_US"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  defaultTheme = "auto"
  disableThemeToggle = false
  DateFormat = "2006-01-02"
  ShowCodeCopyButtons = true
  ShowCover = true
  ShowSummaryCover = true
  disableSpecial1stPost = true
  TocOpen = true
  comments = "giscus"

  [params.homeInfoParams]
    Title = "LoveKorea"

  [params.assets]
    disableFingerprinting = false
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"
    safari_pinned_tab = "safari-pinned-tab.svg"
    theme_color = "#c8463a"
    msapplication_TileColor = "#c8463a"
    css = ["css/custom.css"]

  [params.related]
    useRelatedContent = false
    maxItems = 3
    fillWithLatest = true

  [params.schema]
    publisherType = "Organization"

# giscus 설정은 [params] 블록과 같은 최상위 레벨
[params.giscus]
  repo = "aniposion/lovekorea_comments"
  repoId = "R_kgDOPraKJQ"
  category = "General"
  categoryId = "DIC_kwDOPraKJc4CvGBN"
  mapping = "pathname"
  lang = "en"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "Categories"
    url = "/categories/"
    weight = 2

  [[menu.main]]
    name = "Deals"
    url = "/deals/"
    weight = 3

  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 4

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 5

[related]
  threshold = 0
  includeNewer = true
  toLower = true

  [[related.indices]]
    name = "categories"
    weight = 120

  [[related.indices]]
    name = "tags"
    weight = 80

  [[related.indices]]
    name = "date"
    weight = 10
